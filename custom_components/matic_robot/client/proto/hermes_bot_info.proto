syntax = "proto3";

package hermes_bot_info;

message Unit {}

message BotInformation {
  string serial_number = 1;
  string name = 2;
  string hostname = 3;
  uint32 port = 4;
  string ip4_address = 5;
  string ip6_address = 6;
  bool encrypted = 7;
  bool requires_auth = 8;
  bool network_auth = 9;
  string hardware_revision = 10;
}

message RemoteAccessRequest {
  string request = 1;
}

message RemoteAccessToken {
  string bot_serial = 1;
  string url = 2;
  string token = 3;
}

service HermesDiscoveryRPC {
  rpc GetBotInfo(Unit) returns (BotInformation);
  rpc RequestRemoteToken(stream RemoteAccessRequest)
      returns (RemoteAccessToken);
}
