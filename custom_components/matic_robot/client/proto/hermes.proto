syntax = "proto3";

package hermes;

message Unit {}

message FastBytes {
  bytes bytes = 1;
}

message Value {
  bytes value_bytes_deprecated = 3;
  bytes value_bytes = 4;
  FastBytes fast_bytes = 5;
}

message SequenceId {
  uint64 start_ts_nanos = 1;
  uint64 sequence_no = 2;
}

message CachedEntry {
  SequenceId sequence_id = 1;
  bytes key_bytes = 2;
}

// Presence of this message is required even when all values are defaults.
message SubscriptionServiceConfig {
  uint32 wire_field_3 = 3;
  uint32 wire_field_4 = 4;
  uint64 wire_field_5 = 5;
}

message InitialRequest {
  string collection_name = 1;
  repeated CachedEntry cached_entries = 2;
  SubscriptionServiceConfig config = 3;
  bool wire_field_4 = 4;
}

message CollectionRequest {
  oneof request {
    InitialRequest initial_request = 1;
    SequenceId sequence_id = 2;
  }
}

message CollectionResponse {
  bytes key_bytes = 1;
  Value value = 2;
  SequenceId sequence_id = 3;
}

message ChannelRequest {
  string channel_name = 1;
  bytes value = 2;
}

message ChannelResponse {}

// The property contains a larger internal message. These verified fields are
// deliberately partial; protobuf safely preserves forward compatibility.
message KabukiOutputWire {
  repeated uint32 states = 1 [packed = true];
  repeated uint32 errors = 2 [packed = true];
  string name = 3;
  optional float battery_fraction = 9;
}

service Hermes {
  rpc Handshake(Unit) returns (Unit);
  rpc FetchCollection(stream CollectionRequest)
      returns (stream CollectionResponse);
  rpc SendToChannel(stream ChannelRequest) returns (ChannelResponse);
}
