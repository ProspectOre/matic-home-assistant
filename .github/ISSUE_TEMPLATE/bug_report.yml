name: Bug report
description: Report an integration problem without including private home data.
title: "[Bug]: "
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Privacy check
      options:
        - label: I removed private home data, including credentials, addresses, serial numbers, certificate details, device and room names, maps, captures, backups, and raw Home Assistant storage.
          required: true
  - type: input
    attributes:
      label: Integration version
      placeholder: 0.1.1
    validations:
      required: true
  - type: input
    attributes:
      label: Home Assistant version and installation method
      placeholder: 2026.7.2, Home Assistant OS
    validations:
      required: true
  - type: input
    attributes:
      label: Bluetooth setup
      description: Local adapter model, approximate distance and obstructions to Matic, whether Bluetooth proxies are present, and any other BLE scanner integrations. Pairing needs the local adapter; proxies cannot run setup.
      placeholder: USB adapter about 5 ft away with clear line of sight; 3 ESPHome proxies; Bermuda installed
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Failure stage
      options:
        - Discovery
        - Bluetooth pairing
        - Setup or restart
        - State update
        - Map or rooms
        - Vacuum control
        - Other
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
      description: Give the smallest ordered reproduction using sanitized names.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Sanitized diagnostics or logs
      description: >-
        For pairing problems, paste the matic_robot warning from Settings →
        System → Logs (it names the failing stage). For deeper detail, enable
        debug logging first — Developer tools → Actions → logger.set_level
        with data `custom_components.matic_robot: debug` — then reproduce and
        paste the matic_robot lines. The integration never logs codes,
        addresses, or credentials, but review your paste anyway. Do not attach
        raw storage or captures.
